name: interview_ace
description: A premium AI Interview Coach mobile application in Flutter and Dart.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Persistent Storage
  shared_preferences: ^2.2.3

  # Networking
  http: ^1.2.1

  # Fonts
  google_fonts: ^6.2.1

  # Helpers
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
